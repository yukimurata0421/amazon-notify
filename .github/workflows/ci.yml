name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Use Node 24-based action runtimes (see GitHub Actions Node 20 deprecation).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Syntax check
        run: |
          python -m compileall -q amazon_notify

      - name: Ruff
        run: ruff check amazon_notify tests

      - name: Ruff format check
        run: ruff format --check amazon_notify tests

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: mypy
        run: mypy amazon_notify

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: CLI help
        run: amazon-notify --help

      - name: Run tests with coverage
        run: pytest -q --cov=amazon_notify --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Generate coverage badge JSON
        if: matrix.python-version == '3.11'
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = ET.parse("coverage.xml").getroot()
          line_rate = float(root.attrib.get("line-rate", 0.0))
          coverage = round(line_rate * 100)

          if coverage >= 90:
              color = "brightgreen"
          elif coverage >= 80:
              color = "green"
          elif coverage >= 70:
              color = "yellowgreen"
          elif coverage >= 60:
              color = "yellow"
          elif coverage >= 50:
              color = "orange"
          else:
              color = "red"

          payload = {
              "schemaVersion": 1,
              "label": "coverage",
              "message": f"{coverage}%",
              "color": color,
          }
          badge_path = Path(".github/badges/coverage.json")
          badge_path.parent.mkdir(parents=True, exist_ok=True)
          badge_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit coverage badge
        if: matrix.python-version == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(ci): update coverage badge [skip ci]"
          file_pattern: .github/badges/coverage.json
