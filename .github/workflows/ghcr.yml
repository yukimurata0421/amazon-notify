name: GHCR Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Require successful CI for tagged commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.sha;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: "ci.yml",
                head_sha: headSha,
                per_page: 100,
              },
            );

            const passed = runs.some((run) => {
              return run.name === "CI" && run.status === "completed" && run.conclusion === "success";
            });

            if (!passed) {
              core.setFailed(
                `No successful CI workflow found for tagged commit ${headSha}. Tag only tested commits.`,
              );
            }

  publish:
    runs-on: ubuntu-latest
    needs: verify-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/amazon-notify
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
