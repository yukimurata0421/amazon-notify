name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  verify-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Require successful CI for tagged commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.sha;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: "ci.yml",
                head_sha: headSha,
                per_page: 100,
              },
            );

            const passed = runs.some((run) => {
              return run.name === "CI" && run.status === "completed" && run.conclusion === "success";
            });

            if (!passed) {
              core.setFailed(
                `No successful CI workflow found for tagged commit ${headSha}. Tag only tested commits.`,
              );
            }

  build-and-release:
    runs-on: ubuntu-latest
    needs: verify-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributable artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          make dist
          python -m build --outdir dist

      - name: Extract release notes from changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Failed to extract release notes for version ${version} from CHANGELOG.md"
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/amazon-notify.zip
            dist/*.whl
            dist/*.tar.gz
